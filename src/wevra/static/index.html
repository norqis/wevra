<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wevra Dashboard</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05070b;
      --bg-2: #0a111b;
      --ink: #f3f7ff;
      --muted: #8c99ad;
      --panel: rgba(10, 16, 27, 0.82);
      --panel-strong: rgba(15, 22, 36, 0.95);
      --panel-soft: rgba(255, 255, 255, 0.03);
      --line: rgba(151, 176, 214, 0.18);
      --accent: #7c9cff;
      --accent-2: #28d7b8;
      --accent-3: #ff8d57;
      --good: #55e38e;
      --warn: #ffbf5f;
      --bad: #ff6f91;
      --font-ui: "IBM Plex Sans", sans-serif;
      --font-display: "Space Grotesk", sans-serif;
      --radius: 24px;
      --shadow: 0 22px 80px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #05070b;
    }
    body {
      font-family: var(--font-ui);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(124, 156, 255, 0.20), transparent 28%),
        radial-gradient(circle at top right, rgba(40, 215, 184, 0.12), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255, 141, 87, 0.10), transparent 24%),
        linear-gradient(180deg, #06090f, #09111d 52%, #05070b);
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.75), transparent 90%);
      opacity: 0.22;
    }

    body.locale-ja {
      --font-ui: "Noto Sans JP", "IBM Plex Sans", sans-serif;
      --font-display: "Noto Sans JP", "Space Grotesk", sans-serif;
    }

    .shell {
      width: min(1560px, calc(100% - 32px));
      margin: 14px auto 22px;
      display: grid;
      gap: 14px;
    }

    .hero, .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::before,
    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 45%);
    }

    .hero {
      padding: 18px 20px;
      display: grid;
      gap: 8px;
      align-items: start;
    }

    .hero-topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .hero-controls {
      display: grid;
      justify-items: end;
      gap: 8px;
      min-width: 0;
    }

    .hero-control-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hero-control-row select {
      width: auto;
      min-width: 126px;
    }

    .hero-control-label {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .hero-status {
      text-align: right;
      color: var(--muted);
      font-size: 12px;
      max-width: 420px;
    }

    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(40, 215, 184, 0.24);
      background: rgba(40, 215, 184, 0.08);
      color: #b8ffef;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .live-indicator::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 0 5px rgba(40, 215, 184, 0.12);
    }

    .eyebrow {
      color: var(--accent);
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 700;
    }

    h1 {
      margin: 6px 0 8px;
      font-family: var(--font-display);
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.02;
    }

    .toolbar {
      padding: 12px 14px;
      display: grid;
      gap: 12px;
    }

    .field-stack {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .field-label {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .toolbar-input {
      width: 100%;
      min-height: 120px;
      resize: vertical;
    }

    .toolbar-controls {
      display: grid;
      grid-template-columns: minmax(120px, max-content) minmax(92px, max-content) minmax(148px, max-content) auto;
      gap: 8px;
      align-items: end;
      justify-content: end;
    }

    .toolbar-controls select {
      min-width: 0;
    }

    textarea, select, input, button {
      font: inherit;
    }

    textarea, select, input {
      width: 100%;
      border: 1px solid rgba(151, 176, 214, 0.18);
      border-radius: 14px;
      background: rgba(7, 12, 20, 0.86);
      padding: 10px 12px;
      color: var(--ink);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    select, input {
      min-height: 44px;
    }

    textarea::placeholder,
    input::placeholder {
      color: rgba(193, 203, 220, 0.42);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 999px;
      min-height: 40px;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover { transform: translateY(-1px); }
    .primary {
      background: linear-gradient(135deg, var(--accent), #5de2cf);
      color: #071019;
      box-shadow: 0 14px 32px rgba(86, 180, 255, 0.26);
    }
    .secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      border: 1px solid rgba(151, 176, 214, 0.14);
    }

    .toolbar-controls .primary {
      height: 44px;
      border-radius: 14px;
      padding: 0 18px;
      align-self: end;
    }

    .status-line {
      color: var(--muted);
      font-size: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .queue-column {
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
      min-width: 0;
      position: sticky;
      top: 14px;
    }

    .workspace-shell {
      padding: 14px;
      display: grid;
      gap: 14px;
      align-content: start;
      min-width: 0;
    }

    .workspace-panel {
      border: 1px solid rgba(151, 176, 214, 0.14);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      padding: 14px;
      position: relative;
      overflow: hidden;
    }

    .workspace-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.05), transparent 38%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 52%);
    }

    .panel {
      padding: 14px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 16px;
      font-family: var(--font-display);
      position: relative;
      z-index: 1;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel-head h2 {
      margin: 0;
    }

    .panel-badge {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(151, 176, 214, 0.14);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .list {
      display: grid;
      gap: 8px;
      max-height: 50vh;
      overflow: auto;
      padding-right: 4px;
    }

    .card {
      border: 1px solid rgba(151, 176, 214, 0.12);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.02));
      padding: 11px 12px;
      display: grid;
      gap: 5px;
      transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
      position: relative;
    }

    .command-item {
      border: 1px solid rgba(151, 176, 214, 0.10);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
      padding: 12px 13px;
      display: grid;
      gap: 6px;
      position: relative;
      cursor: pointer;
      transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.015);
    }

    .command-item::before {
      content: "";
      position: absolute;
      inset: 10px auto 10px 0;
      width: 3px;
      border-radius: 999px;
      background: transparent;
      transition: background 0.18s ease;
    }

    .command-item .title {
      font-size: 13px;
      line-height: 1.25;
    }

    .command-item .summary {
      color: rgba(239, 244, 255, 0.88);
      font-size: 12px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .command-item[data-command-id] {
      cursor: pointer;
    }

    .command-item[data-command-id]:hover {
      transform: translateY(-1px);
      border-color: rgba(124, 156, 255, 0.34);
    }

    .command-item.selected {
      border-color: rgba(124, 156, 255, 0.48);
      background: linear-gradient(180deg, rgba(124, 156, 255, 0.14), rgba(255, 255, 255, 0.03));
      box-shadow: inset 0 0 0 1px rgba(124, 156, 255, 0.08);
    }

    .command-item.selected::before {
      background: var(--accent);
    }

    .command-item.attention {
      border-color: rgba(255, 191, 95, 0.38);
      background: linear-gradient(180deg, rgba(255, 191, 95, 0.12), rgba(255, 255, 255, 0.02));
      box-shadow: inset 0 0 0 1px rgba(255, 191, 95, 0.08);
    }

    .command-item.attention::before {
      background: rgba(255, 191, 95, 0.82);
    }

    .command-item.selected.attention {
      border-color: rgba(255, 191, 95, 0.58);
      box-shadow: inset 0 0 0 1px rgba(255, 191, 95, 0.14);
    }

    .command-item.queued-state {
      border-color: rgba(151, 176, 214, 0.14);
      background: linear-gradient(180deg, rgba(210, 220, 235, 0.06), rgba(255, 255, 255, 0.02));
    }

    .command-item.queued-state::before {
      background: rgba(151, 176, 214, 0.40);
    }

    .command-item.waiting_approval-state {
      border-color: rgba(255, 191, 95, 0.38);
      background: linear-gradient(180deg, rgba(255, 191, 95, 0.12), rgba(255, 255, 255, 0.02));
      box-shadow: inset 0 0 0 1px rgba(255, 191, 95, 0.08);
    }

    .command-item.waiting_approval-state::before {
      background: rgba(255, 191, 95, 0.86);
    }

    .command-item.planning-state,
    .command-item.running-state,
    .command-item.replanning-state,
    .command-item.verifying-state {
      border-color: rgba(85, 227, 142, 0.34);
      background: linear-gradient(180deg, rgba(85, 227, 142, 0.10), rgba(255, 255, 255, 0.02));
      box-shadow: inset 0 0 0 1px rgba(85, 227, 142, 0.08);
    }

    .command-item.planning-state::before,
    .command-item.running-state::before,
    .command-item.replanning-state::before,
    .command-item.verifying-state::before {
      background: rgba(85, 227, 142, 0.86);
    }

    .title {
      font-weight: 700;
      font-size: 14px;
    }

    .meta {
      color: var(--muted);
      font-size: 11px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(151, 176, 214, 0.1);
    }

    .pill.done, .pill.approve, .pill.completed, .pill.approved { color: var(--good); }
    .pill.waiting_question, .pill.blocked, .pill.request_changes, .pill.waiting_approval, .pill.pending_approval { color: var(--warn); }
    .pill.failed, .pill.fail, .pill.denied { color: var(--bad); }
    .pill.running, .pill.planning, .pill.replanning, .pill.verifying { color: var(--accent-2); }

    .question-alert {
      display: none;
      padding: 16px 18px 18px;
      border-color: rgba(255, 191, 95, 0.42);
      background:
        radial-gradient(circle at top right, rgba(255, 191, 95, 0.16), transparent 32%),
        linear-gradient(180deg, rgba(255, 191, 95, 0.10), rgba(255, 255, 255, 0.02));
      box-shadow:
        0 18px 48px rgba(0, 0, 0, 0.36),
        inset 0 0 0 1px rgba(255, 191, 95, 0.08);
    }

    .question-alert.open {
      display: grid;
    }

    .question-alert-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 20px;
      align-items: start;
    }

    .question-alert-copy {
      display: grid;
      gap: 10px;
    }

    .question-alert-title {
      font-family: var(--font-display);
      font-size: 18px;
      line-height: 1.15;
      margin: 0;
    }

    .question-alert-text {
      color: #fff6d6;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .question-alert-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .question-alert-form {
      display: grid;
      align-self: stretch;
      gap: 10px;
      justify-items: stretch;
    }

    .question-alert textarea {
      min-height: 104px;
      border-color: rgba(255, 191, 95, 0.22);
      background: rgba(12, 10, 4, 0.58);
      width: 100%;
    }

    .question-alert .primary {
      width: 100%;
      background: linear-gradient(135deg, #ffd36f, #ffbf5f);
      color: #231808;
      box-shadow: 0 14px 32px rgba(255, 191, 95, 0.20);
    }

    .workspace-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .workspace-heading {
      display: grid;
      gap: 8px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(124, 156, 255, 0.2);
      background:
        radial-gradient(circle at top right, rgba(124, 156, 255, 0.16), transparent 32%),
        linear-gradient(180deg, rgba(124, 156, 255, 0.08), rgba(255, 255, 255, 0.02));
    }

    .workspace-goal {
      font-size: 17px;
      line-height: 1.28;
      font-weight: 700;
    }

    .workspace-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .workspace-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .workspace-action {
      min-height: 38px;
      border-radius: 14px;
      padding: 0 14px;
      font-size: 12px;
    }

    .workspace-action.result-ready {
      background: linear-gradient(135deg, var(--accent), #5de2cf);
      color: #071019;
      box-shadow: 0 14px 32px rgba(86, 180, 255, 0.22);
    }

    .workspace-action.append-action {
      background: linear-gradient(135deg, #ff9a62, #ff5f7a);
      color: #1b0a0e;
      border-color: rgba(255, 138, 111, 0.34);
      box-shadow: 0 14px 34px rgba(255, 95, 122, 0.22);
    }

    .workspace-action:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .detail-card {
      border: 1px solid rgba(151, 176, 214, 0.12);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.02));
      padding: 11px 12px;
      display: grid;
      gap: 6px;
    }

    .detail-card h3 {
      margin: 0;
      font-size: 12px;
      font-family: var(--font-display);
    }

    .detail-banner {
      grid-column: 1 / -1;
      border-radius: 16px;
      border: 1px solid rgba(255, 111, 145, 0.28);
      background: linear-gradient(180deg, rgba(255, 111, 145, 0.12), rgba(255, 255, 255, 0.02));
      padding: 12px 14px;
      display: grid;
      gap: 6px;
    }

    .detail-banner.warn {
      border-color: rgba(255, 191, 95, 0.28);
      background: linear-gradient(180deg, rgba(255, 191, 95, 0.12), rgba(255, 255, 255, 0.02));
    }

    .detail-banner h3 {
      margin: 0;
      font-size: 12px;
      font-family: var(--font-display);
    }

    .detail-banner .body {
      color: rgba(239, 244, 255, 0.9);
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.5;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: minmax(260px, 0.8fr) minmax(0, 1fr);
      gap: 12px;
    }

    .detail-keyvals {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
    }

    .detail-keyvals strong {
      color: var(--ink);
      font-weight: 700;
    }

    .workspace-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0;
    }

    .workspace-tab {
      min-height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(151, 176, 214, 0.14);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .workspace-tab.active {
      background: linear-gradient(135deg, rgba(124, 156, 255, 0.20), rgba(93, 226, 207, 0.16));
      color: var(--ink);
      border-color: rgba(124, 156, 255, 0.32);
      box-shadow: inset 0 0 0 1px rgba(124, 156, 255, 0.08);
    }

    .tab-panel {
      display: none;
      margin-top: 8px;
    }

    .tab-panel.active {
      display: block;
    }

    .activity-stack {
      display: grid;
      gap: 14px;
    }

    .activity-section {
      display: grid;
      gap: 10px;
    }

    .activity-section h3 {
      margin: 0;
      font-size: 12px;
      font-family: var(--font-display);
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid rgba(151, 176, 214, 0.12);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      padding: 10px 12px;
      display: grid;
      gap: 6px;
    }

    .history-item .title {
      font-size: 12px;
    }

    .history-item .body {
      color: rgba(239, 244, 255, 0.88);
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.55;
    }

    .agent-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .agent-actions button {
      min-height: 36px;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 12px;
    }

    .agent-actions .deny {
      background: rgba(255, 111, 145, 0.14);
      color: #ffd5df;
      border: 1px solid rgba(255, 111, 145, 0.22);
    }

    .agent-run-summary {
      color: rgba(239, 244, 255, 0.84);
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.5;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(5, 9, 15, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 40;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(960px, 100%);
      max-height: min(82vh, 920px);
      border-radius: 24px;
      background: rgba(8, 13, 22, 0.98);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(151, 176, 214, 0.12);
    }

    .modal-body {
      padding: 18px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function displayGoal(goal) {
      const value = String(goal || '');
      return value.replace(/^(?:\[[^\]]+\]\s*)+/, '') || value;
    }

    async function api(url, options = {}) {
      const response = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || `Request failed: ${response.status}`);
      }
      return response.json();
    }

      document.getElementById('overviewTab').textContent = t('overview');
      document.getElementById('eventsHeading').textContent = t('eventsHeading');
      document.getElementById('commandsBadge').textContent = t('commandsBadge');
      document.getElementById('submitBtn').textContent = t('submitBtn');
      document.getElementById('refreshBtn').textContent = t('refreshBtn');
      document.getElementById('closeResultBtn').textContent = t('closeResultBtn');
      document.getElementById('closeAppendBtn').textContent = t('closeAppendBtn');
      document.getElementById('appendModalEyebrow').textContent = t('appendModalEyebrow');
      document.getElementById('appendModalTitle').textContent = t('appendModalTitle');
      document.getElementById('appendModalSubmit').textContent = t('appendBtn');
      document.getElementById('languageLabel').textContent = t('languageLabel');
      document.getElementById('liveIndicator').textContent = t('liveIndicator');
      document.getElementById('goalLabel').textContent = t('goalLabel');
      document.getElementById('workflowLabel').textContent = t('workflowLabel');
      document.getElementById('priorityLabelText').textContent = t('priorityLabelText');
      document.getElementById('backendLabelText').textContent = t('backendLabelText');
      document.getElementById('resultModalEyebrow').textContent = t('resultModalEyebrow');
      document.getElementById('resultModalTitle').textContent = t('resultModalTitle');
      document.getElementById('goal').placeholder = t('goalPlaceholder');
      appendModalInputEl.placeholder = t('appendPlaceholder');
      document.getElementById('instructionsHeading').textContent = t('instructionsHeading');
      document.getElementById('questionHistoryHeading').textContent = t('questionHistory');
      document.getElementById('languageSelect').value = locale;
      document.querySelector('#languageSelect option[value="en"]').textContent = locale === 'ja' ? '英語' : 'English';
      document.querySelector('#languageSelect option[value="ja"]').textContent = locale === 'ja' ? '日本語' : 'Japanese';
      document.querySelector('#workflowMode option[value="auto"]').textContent = modeLabel('auto');
      document.querySelector('#workflowMode option[value="implementation"]').textContent = modeLabel('implementation');
      document.querySelector('#workflowMode option[value="research"]').textContent = modeLabel('research');
      document.querySelector('#workflowMode option[value="review"]').textContent = modeLabel('review');
      document.querySelector('#workflowMode option[value="planning"]').textContent = modeLabel('planning');
      document.querySelector('#priority option[value="high"]').textContent = priorityLabel('high');
      document.querySelector('#priority option[value="medium"]').textContent = priorityLabel('medium');
      document.querySelector('#priority option[value="low"]').textContent = priorityLabel('low');
      document.querySelector('#backend option[value=""]').textContent = t('executionDefaultLabel');
      if (!state.snapshot) {
        statusLineEl.textContent = t('loading');
      }
    }

    function pill(value, formatter = (item) => item) {
      const klass = String(value || '').replace(/\s+/g, '_');
      return `<span class="pill ${klass}">${escapeHtml(formatter(value || '-'))}</span>`;
    }

    function setWorkspaceTab(tabName) {
      state.currentTab = tabName;
      document.querySelectorAll('.workspace-tab').forEach((button) => {
        button.classList.toggle('active', button.dataset.tab === tabName);
      });
      document.querySelectorAll('.tab-panel').forEach((panel) => {
        panel.classList.toggle('active', panel.dataset.tabPanel === tabName);
      });
    }

    function captureScrollPositions() {
      return {
        commands: commandsListEl.scrollTop,
        tasks: tasksListEl.scrollTop,
        reviews: reviewsListEl.scrollTop,
        agents: agentRunsListEl.scrollTop,
        instructions: instructionsListEl.scrollTop,
        questionHistory: questionHistoryListEl.scrollTop,
        events: eventsListEl.scrollTop,
      };
    }

    function restoreScrollPositions(positions) {
      if (!positions) return;
      commandsListEl.scrollTop = positions.commands || 0;
      tasksListEl.scrollTop = positions.tasks || 0;
      reviewsListEl.scrollTop = positions.reviews || 0;
      agentRunsListEl.scrollTop = positions.agents || 0;
      instructionsListEl.scrollTop = positions.instructions || 0;
      questionHistoryListEl.scrollTop = positions.questionHistory || 0;
      eventsListEl.scrollTop = positions.events || 0;
    }

    function syncAppendSubmitState() {
      appendModalSubmitEl.disabled = state.appending || !appendModalInputEl.value.trim();
    }

    function syncQuestionSubmitState(questionId) {
      const answerInput = document.getElementById('questionAlertAnswer');
      const submitButton = document.getElementById('questionAlertSubmit');
      if (!answerInput || !submitButton) return;
      submitButton.disabled = state.answeringQuestionId === questionId || !answerInput.value.trim();
    }

    function selectedCommand(snapshot = state.snapshot) {
      if (!snapshot) return null;
      const selected = state.selectedCommandId || snapshot.commands.active[0]?.id || snapshot.commands.items[0]?.id;
      return snapshot.commands.items.find((item) => item.id === selected) || null;
    }

    function selectedPendingApprovals(snapshot = state.snapshot) {
      const command = selectedCommand(snapshot);
      if (!snapshot || !command) return [];
      return snapshot.agent_runs.pending.filter((item) => item.command_id === command.id);
    }

    function updateBusyState() {
      submitBtnEl.disabled = state.submitting;
      refreshBtnEl.disabled = state.refreshInFlight;
      syncAppendSubmitState();
      if (state.answeringQuestionId) {
        syncQuestionSubmitState(state.answeringQuestionId);
      } else {
        const submitButton = document.getElementById('questionAlertSubmit');
        if (submitButton) {
          const answerInput = document.getElementById('questionAlertAnswer');
          submitButton.disabled = !answerInput || !answerInput.value.trim();
        }
      }
    }

    async function submitAnswer(questionId, answer) {
      if (state.answeringQuestionId) return;
      state.answeringQuestionId = questionId;
      updateBusyState();
      statusLineEl.textContent = `${t('answering')} ${questionId}…`;
      try {
        await api('/api/questions/answer', {
          method: 'POST',
          body: JSON.stringify({ question_id: questionId, answer }),
        });
        delete state.questionDrafts[questionId];
        await refreshSnapshot();
      } finally {
        state.answeringQuestionId = null;
        updateBusyState();
      }
    }

    function renderCommands(snapshot) {
      const commands = snapshot.commands.items;
      const openQuestionCommands = new Set(snapshot.questions.open.map((question) => question.command_id));
      commandsListEl.innerHTML = commands.map((command) => `
        <article class="command-item ${state.selectedCommandId === command.id ? 'selected' : ''} ${openQuestionCommands.has(command.id) ? 'attention' : ''} ${escapeHtml(command.stage)}-state" data-command-id="${command.id}">
          <div class="title">${escapeHtml(displayGoal(command.goal))}</div>
          <div class="meta">
            ${pill(command.stage, stageLabel)}
            ${pill(command.effective_mode || command.workflow_mode, modeLabel)}
          </div>
        </article>
      `).join('') || `<div class="meta">${escapeHtml(t('noCommands'))}</div>`;

      commandsListEl.querySelectorAll('[data-command-id]').forEach((node) => {
        node.addEventListener('click', () => {
          state.selectedCommandId = node.getAttribute('data-command-id');
          renderDetail(snapshot);
          renderTasks(snapshot);
          renderQuestionAlert(snapshot);
          renderReviews(snapshot);
          renderAgentRuns(snapshot);
          renderInstructions(snapshot);
          renderQuestionHistory(snapshot);
          renderEvents(snapshot);
        });
      });
    }

    function renderTasks(snapshot) {
      const selected = state.selectedCommandId;
      const tasks = snapshot.tasks.items.filter((task) => !selected || task.command_id === selected);
      tasksListEl.innerHTML = tasks.map((task) => `
        <article class="card">
          <div class="title">${escapeHtml(task.title)}</div>
          <div>${escapeHtml(task.description)}</div>
          <div class="meta">
            ${pill(task.state, taskStateLabel)}
            <span>${escapeHtml(capabilityLabel(task.capability))}</span>
            <span>${escapeHtml(t('key'))}: ${escapeHtml(task.task_key)}</span>
          </div>
          <div class="meta">
            <span>${escapeHtml(t('dependsOn'))}: ${escapeHtml((task.depends_on || []).join(', ') || '-')}</span>
            <span>${escapeHtml(t('writeFiles'))}: ${escapeHtml((task.input_payload.write_files || []).join(', ') || '-')}</span>
          </div>
        </article>
      `).join('') || `<div class="meta">${escapeHtml(t('noTasks'))}</div>`;
    }

    function renderQuestionAlert(snapshot) {
      const openQuestions = snapshot.questions.open;
      const selected = state.selectedCommandId;
      const question = selected ? openQuestions.find((item) => item.command_id === selected) : null;
      const questionCommand = snapshot.commands.items.find((item) => item.id === question?.command_id);
      if (!question) {
        questionAlertEl.classList.remove('open');
        questionAlertBodyEl.innerHTML = '';
        state.answeringQuestionId = null;
        state.visibleQuestionId = null;
        return;
      }

      const currentInput = document.getElementById('questionAlertAnswer');
      const hadFocus = document.activeElement === currentInput;
      const selectionStart = currentInput?.selectionStart ?? null;
      const selectionEnd = currentInput?.selectionEnd ?? null;
      if (currentInput && state.visibleQuestionId) {
        state.questionDrafts[state.visibleQuestionId] = currentInput.value;
      }
      state.visibleQuestionId = question.id;

      questionAlertEl.classList.add('open');
      questionAlertBodyEl.innerHTML = `
        <div class="question-alert-copy">
          <div class="eyebrow">${escapeHtml(t('questionAlertTitle'))}</div>
          <h2 class="question-alert-title">${escapeHtml(displayGoal(questionCommand?.goal || question.command_id))}</h2>
          <div class="question-alert-text">${escapeHtml(question.question)}</div>
        </div>
        <div class="question-alert-form">
          <textarea id="questionAlertAnswer" placeholder="${escapeHtml(t('answerPlaceholder'))}"></textarea>
          <button class="primary" id="questionAlertSubmit">${escapeHtml(t('answerButton'))}</button>
        </div>
      `;

      const submitButton = document.getElementById('questionAlertSubmit');
      const answerInput = document.getElementById('questionAlertAnswer');
      answerInput.value = state.questionDrafts[question.id] || '';
      answerInput.addEventListener('input', () => {
        state.questionDrafts[question.id] = answerInput.value;
        syncQuestionSubmitState(question.id);
      });
      if (hadFocus) {
        answerInput.focus();
        if (selectionStart !== null && selectionEnd !== null) {
          answerInput.setSelectionRange(selectionStart, selectionEnd);
        }
      }
      submitButton.addEventListener('click', async () => {
        const answer = answerInput.value.trim();
        if (!answer) return;
        await submitAnswer(question.id, answer);
      });
      syncQuestionSubmitState(question.id);
    }

    function renderReviews(snapshot) {
      const selected = state.selectedCommandId;
      const reviews = snapshot.reviews.items.filter((review) => !selected || review.command_id === selected);
      reviewsListEl.innerHTML = reviews.map((review) => `
        <article class="card">
          <div class="title">${escapeHtml(t('reviewerLabel'))} ${review.reviewer_slot}</div>
          <div>${escapeHtml(review.summary)}</div>
          <div class="meta">
            ${pill(review.decision, reviewDecisionLabel)}
          </div>
        </article>
      `).join('') || `<div class="meta">${escapeHtml(t('noReviews'))}</div>`;
    }

    async function submitAgentDecision(agentRunId, decision) {
      if (state.agentDecisionInFlight) return;
      state.agentDecisionInFlight = agentRunId;
      if (state.snapshot) {
        render(state.snapshot);
      } else {
        updateBusyState();
      }
      statusLineEl.textContent = decision === 'approve'
        ? `${t('allow')} ${agentRunId}…`
        : `${t('deny')} ${agentRunId}…`;
      try {
        await api(`/api/agent-runs/${decision}`, {
          method: 'POST',
          body: JSON.stringify({ agent_run_id: agentRunId }),
        });
        await refreshSnapshot();
      } finally {
        state.agentDecisionInFlight = null;
        updateBusyState();
      }
    }

    function renderAgentRuns(snapshot) {
      const selected = state.selectedCommandId;
      const agentRuns = snapshot.agent_runs.items
        .filter((item) => !selected || item.command_id === selected)
        .slice()
        .reverse();
      agentRunsListEl.innerHTML = agentRuns.map((agentRun) => {
        const pending = agentRun.state === 'pending_approval';
        const busy = state.agentDecisionInFlight === agentRun.id;
        const summary = agentRun.error || agentRun.output_summary || agentRun.prompt_excerpt || '';
        return `
          <article class="card">
            <div class="title">${escapeHtml(agentRun.title)}</div>
            <div class="meta">
              ${pill(agentRun.state, agentRunStateLabel)}
              ${pill(agentRun.run_kind, agentRunKindLabel)}
              <span>${escapeHtml(t('agentRole'))}: ${escapeHtml(agentRun.role_name)}</span>
              <span>${escapeHtml(agentRun.runtime)}${agentRun.model ? ` / ${escapeHtml(agentRun.model)}` : ''}</span>
            </div>
            ${summary ? `<div class="agent-run-summary">${escapeHtml(summary)}</div>` : ''}
            <div class="meta">
              <span>${escapeHtml(agentRun.created_at)}</span>
            </div>
            ${pending ? `
              <div class="agent-actions">
                <button class="primary" data-agent-allow="${escapeHtml(agentRun.id)}" ${busy ? 'disabled' : ''}>${escapeHtml(t('allow'))}</button>
                <button class="deny" data-agent-deny="${escapeHtml(agentRun.id)}" ${busy ? 'disabled' : ''}>${escapeHtml(t('deny'))}</button>
              </div>
            ` : ''}
          </article>
        `;
      }).join('') || `<div class="meta">${escapeHtml(t('noAgentRuns'))}</div>`;

      agentRunsListEl.querySelectorAll('[data-agent-allow]').forEach((node) => {
        node.addEventListener('click', () => submitAgentDecision(node.dataset.agentAllow, 'approve'));
      });
      agentRunsListEl.querySelectorAll('[data-agent-deny]').forEach((node) => {
        node.addEventListener('click', () => submitAgentDecision(node.dataset.agentDeny, 'deny'));
      });
    }

    function renderQuestionHistory(snapshot) {
      const selected = state.selectedCommandId;
      const questionHistory = snapshot.questions.items
        .filter((item) => !selected || item.command_id === selected)
        .slice()
        .reverse()
        .slice(0, 8);
      questionHistoryListEl.innerHTML = questionHistory.map((item) => `
        <article class="history-item">
          <div class="title">${pill(item.state, questionStateLabel)} ${pill(item.resolution_mode, resolutionLabel)}</div>
          <div class="body">${escapeHtml(item.question)}</div>
          ${item.answer ? `<div class="meta"><strong>${escapeHtml(t('answerLabel'))}:</strong> ${escapeHtml(item.answer)}</div>` : ''}
        </article>
      `).join('') || `<div class="meta">${escapeHtml(t('noQuestionHistory'))}</div>`;
    }

    function renderInstructions(snapshot) {
      const selected = state.selectedCommandId;
      const instructions = snapshot.instructions.items
        .filter((item) => !selected || item.command_id === selected)
        .slice()
        .reverse()
        .slice(0, 8);
      instructionsListEl.innerHTML = instructions.map((item) => `
        <article class="history-item">
          <div class="body">${escapeHtml(item.body)}</div>
        </article>
      `).join('') || `<div class="meta">${escapeHtml(t('noInstructions'))}</div>`;
    }

    function renderEvents(snapshot) {
      const selected = state.selectedCommandId;
      const events = snapshot.events.filter((event) => !selected || event.payload.command_id === selected || event.stream_id === selected).slice().reverse().slice(0, 18);
      eventsListEl.innerHTML = events.map((event) => `
        <article class="card">
          <div class="title">${escapeHtml(eventLabel(event.event_type))}</div>
          <div class="meta">
            <span>${escapeHtml(event.created_at)}</span>
          </div>
        </article>
      `).join('') || `<div class="meta">${escapeHtml(t('noEvents'))}</div>`;
    }

    function renderDetail(snapshot) {
      const selected = state.selectedCommandId || snapshot.commands.active[0]?.id || snapshot.commands.items[0]?.id;
      if (!selected) {
        viewResultBtnEl.textContent = t('resultUnavailable');
        viewResultBtnEl.disabled = true;
        viewResultBtnEl.classList.remove('result-ready');
        openAppendBtnEl.textContent = t('appendAction');
        openAppendBtnEl.disabled = true;
        commandDetailEl.innerHTML = `<div class="meta">${escapeHtml(t('noCommandSelected'))}</div>`;
        return;
      }
      state.selectedCommandId = selected;
      const command = snapshot.commands.items.find((item) => item.id === selected);
      const pendingApprovals = snapshot.agent_runs.pending.filter((item) => item.command_id === selected);
      const appendLocked = Boolean(command?.final_response) || ['done', 'failed'].includes(command.stage);
      viewResultBtnEl.textContent = command?.final_response ? t('viewResult') : t('resultUnavailable');
      viewResultBtnEl.disabled = !command?.final_response;
      viewResultBtnEl.classList.toggle('result-ready', Boolean(command?.final_response));
      openAppendBtnEl.textContent = t('appendAction');
      openAppendBtnEl.disabled = appendLocked || state.appending;

      commandDetailEl.innerHTML = `
        <div class="workspace-heading" style="grid-column: 1 / -1;">
          <div style="display:grid; gap:8px;">
            <h2 style="margin:0; font-size:15px;">${escapeHtml(t('selectedHeading'))}</h2>
            <div class="workspace-goal">${escapeHtml(displayGoal(command.goal))}</div>
          </div>
          <div class="workspace-meta">
            ${pill(command.effective_mode || command.workflow_mode, modeLabel)}
            ${pill(command.stage, stageLabel)}
          </div>
        </div>
        ${pendingApprovals.length ? `
          <div class="detail-banner warn">
            <h3>${escapeHtml(t('approvalNeeded'))}</h3>
            <div class="body">${escapeHtml(t('approvalHelp'))}</div>
          </div>
        ` : ''}
        ${command.failure_reason ? `
          <div class="detail-banner">
            <h3>${escapeHtml(t('agentError'))}</h3>
            <div class="body">${escapeHtml(command.failure_reason)}</div>
          </div>
        ` : ''}
        <div class="detail-card">
          <h3>${escapeHtml(t('overview'))}</h3>
          <div class="detail-keyvals">
            <div><strong>${escapeHtml(t('id'))}:</strong> ${escapeHtml(command.id)}</div>
            <div><strong>${escapeHtml(t('mode'))}:</strong> ${escapeHtml(modeLabel(command.effective_mode || command.workflow_mode))}</div>
            <div><strong>${escapeHtml(t('stage'))}:</strong> ${escapeHtml(stageLabel(command.stage))}</div>
            <div><strong>${escapeHtml(t('workingDirectory'))}:</strong> ${escapeHtml(command.workspace_root)}</div>
          </div>
        </div>
        ${command?.final_response ? `
          <div class="detail-card">
            <h3>${escapeHtml(t('result'))}</h3>
            <div class="detail-keyvals">
              <div>${escapeHtml(t('resultReady'))}</div>
            </div>
          </div>
        ` : ''}
      `;
      viewResultBtnEl.onclick = command?.final_response ? () => openResultModal(command) : null;
      openAppendBtnEl.onclick = appendLocked ? null : openAppendModal;
    }

    function openResultModal(command) {
      state.modalCommandId = command.id;
      resultModalTitleEl.textContent = `${t('result')} · ${command.id}`;
      resultModalBodyEl.textContent = command.final_response || t('noResultAvailable');
      resultModalEl.classList.add('open');
    }

    function closeResultModal() {
      state.modalCommandId = null;
      resultModalEl.classList.remove('open');
    }

    function openAppendModal() {
      if (!state.selectedCommandId) return;
      appendModalInputEl.value = '';
      appendModalEl.classList.add('open');
      syncAppendSubmitState();
      appendModalInputEl.focus();
    }

    function closeAppendModal() {
      appendModalEl.classList.remove('open');
      syncAppendSubmitState();
    }

    function render(snapshot) {
      const scrollPositions = captureScrollPositions();
      state.snapshot = snapshot;
      state.lastChecksum = snapshot.checksum;
      applyLocale();
      if (!snapshot.commands.items.some((item) => item.id === state.selectedCommandId)) {
        state.selectedCommandId = snapshot.commands.active[0]?.id || snapshot.commands.items[0]?.id || null;
      }
      renderCommands(snapshot);
      renderDetail(snapshot);
      renderTasks(snapshot);
      renderQuestionAlert(snapshot);
      renderReviews(snapshot);
      renderAgentRuns(snapshot);
      renderInstructions(snapshot);
      renderQuestionHistory(snapshot);
      renderEvents(snapshot);
      setWorkspaceTab(state.currentTab);
      restoreScrollPositions(scrollPositions);
      updateBusyState();
      statusLineEl.textContent = `${t('updated')} ${snapshot.generated_at}`;
    }

    async function refreshSnapshot() {
      if (state.refreshInFlight) return;
      state.refreshInFlight = true;
      updateBusyState();
      try {
        const snapshot = await api('/api/snapshot');
        if (snapshot.checksum === state.lastChecksum && state.snapshot) {
          state.snapshot = snapshot;
          statusLineEl.textContent = `${t('updated')} ${snapshot.generated_at}`;
          return;
        }
        render(snapshot);
      } finally {
        state.refreshInFlight = false;
        updateBusyState();
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', refreshSnapshot);
    document.getElementById('languageSelect').addEventListener('change', (event) => {
      const nextLocale = event.target.value;
      state.localeOverride = nextLocale;
      const url = new URL(window.location.href);
      url.searchParams.set('lang', nextLocale);
      window.history.replaceState({}, '', url);
      if (state.snapshot) {
        render(state.snapshot);
      } else {
        applyLocale();
      }
    });
    document.getElementById('submitBtn').addEventListener('click', async () => {
      if (state.submitting) return;
      const goal = document.getElementById('goal').value.trim();
      if (!goal) return;
      const workflowMode = document.getElementById('workflowMode').value;
      const priority = document.getElementById('priority').value;
      const backend = document.getElementById('backend').value;
      state.submitting = true;
      updateBusyState();
      statusLineEl.textContent = t('submitting');
      try {
        await api('/api/commands', {
          method: 'POST',
          body: JSON.stringify({ goal, workflow_mode: workflowMode, priority, backend }),
        });
        document.getElementById('goal').value = '';
        await refreshSnapshot();
      } finally {
        state.submitting = false;
        updateBusyState();
      }
    });
    appendModalInputEl.addEventListener('input', syncAppendSubmitState);
    document.getElementById('appendModalSubmit').addEventListener('click', async () => {
      if (state.appending) return;
      const commandId = state.selectedCommandId;
      const body = appendModalInputEl.value.trim();
      if (!commandId || !body) return;
      state.appending = true;
      updateBusyState();
      statusLineEl.textContent = `${t('appending')} ${commandId}…`;
      try {
        await api('/api/commands/append', {
          method: 'POST',
          body: JSON.stringify({ command_id: commandId, body }),
        });
        appendModalInputEl.value = '';
        closeAppendModal();
        await refreshSnapshot();
      } finally {
        state.appending = false;
        updateBusyState();
      }
    });
    document.getElementById('closeResultBtn').addEventListener('click', closeResultModal);
    document.getElementById('closeAppendBtn').addEventListener('click', closeAppendModal);
    resultModalEl.addEventListener('click', (event) => {
      if (event.target === resultModalEl) closeResultModal();
    });
    appendModalEl.addEventListener('click', (event) => {
      if (event.target === appendModalEl) closeAppendModal();
    });
    workspaceTabsEl.querySelectorAll('[data-tab]').forEach((button) => {
      button.addEventListener('click', () => setWorkspaceTab(button.dataset.tab));
    });

    applyLocale();
    updateBusyState();
    refreshSnapshot();
    setInterval(refreshSnapshot, 2500);
  </script>
</body>
</html>
